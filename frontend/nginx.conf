server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the agent container (same-origin -> no CORS in the browser).
    location /api/ {
        proxy_pass         http://api:8000;
        proxy_set_header   Host $host;
        proxy_read_timeout 300s;   # /api/execute budget is < 300s (Vercel parity)
    }

    location / {
        try_files $uri /index.html;
    }
}
